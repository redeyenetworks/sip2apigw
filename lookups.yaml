# Call purpose substitutions.
# Keys are substrings searched for in the SIP display name.
# Values are the speech-ready substitution.
# Order matters: first match wins.
call_purposes:
  "Blue": "Code Blue"
  "RRT": "Rapid Response Team"
  "Pink": "Code Pink"

# Default call purpose when no match is found.
default_purpose: "Code"

# Room number to speech-ready name mapping.
# When a room number has an entry here, the mapped name is used
# instead of "Room {number}." in the TTS output.
# Add entries as needed, e.g.:
#   208: "Mens' Room"
#   209: "Womens' Room"
rooms: {}

# Default room format when room number is not found in the rooms table.
# Use {room} as a placeholder for the numeric room number.
default_room_format: "Room {room}."
